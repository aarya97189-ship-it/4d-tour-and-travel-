<style>
.hero-slider{
position:relative;
width:100%;

.slide.active{

.overlay{

.btn{

</style>

<script>
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(){
slides.forEach(slide => slide.classList.remove("active"));
currentSlide++;
if(currentSlide > slides.length){
currentSlide = 1;
}
slides[currentSlide-1].classList.add("active");
}

setInterval(showSlide, 4000);
</script>
