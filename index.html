<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Tour and Travel - Uttarakhand</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Luxury Header & Navigation */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 50px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(11,15,25,0.9), rgba(11,15,25,0));
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #d4af37; /* Gold Theme */
            text-decoration: none;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 30px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #d4af37;
        }

        /* Hero Slider Section */
        .hero-slider {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            animation: sliderAnimation 18s infinite;
            background-size: cover;
            background-position: center;
        }

        /* Automatic Slider Images (Fixed Missing Photos with Premium Travel Images) */
        .slide:nth-child(1) {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1544735716-392fe2489ffa?auto=format&fit=crop&w=1920&q=80');
            animation-delay: 0s;
        }
        .slide:nth-child(2) {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1596176530529-78163a4f7af2?auto=format&fit=crop&w=1920&q=80');
            animation-delay: 6s;
        }
        .slide:nth-child(3) {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1626621341515-bbf8a5f60fc0?auto=format&fit=crop&w=1920&q=80');
            animation-delay: 12s;
        }

        @keyframes sliderAnimation {
            0% { opacity: 0; transform: scale(1); }
            5% { opacity: 1; }
            33% { opacity: 1; }
            38% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 0; }
        }

        /* Hero Content overlay */
        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 80%;
        }

        .hero-content h1 {
            font-size: 55px;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-content h1 span {
            color: #d4af37;
        }

        .hero-content p {
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        .btn-luxury {
            display: inline-block;
            padding: 12px 35px;
            border: 2px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.4s ease;
        }

        .btn-luxury:hover {
            background-color: #d4af37;
            color: #0b0f19;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* Floating WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 9999;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
            color: white;
        }

        /* Responsive Mobile Menu */
        @media (max-width: 768px) {
            header { padding: 20px; }
            .nav-links { display: none; } /* Can be toggled with JS later */
            .hero-content h1 { font-size: 34px; }
            .hero-content p { font-size: 14px; }
            .whatsapp-float { width: 50px; height: 50px; font-size: 26px; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <!-- Luxury Header Section -->
    <header>
        <a href="#" class="logo">4D TOUR & TRAVEL</a>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Packages</a></li>
            <li><a href="#">Fleet</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </header>

    <!-- Hero Background Slider Section -->
    <div class="hero-slider">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        
        <!-- Hero Static Content Overlay -->
        <div class="hero-content">
            <h1>Experience Uttarakhand <br>In <span>Pure Luxury</span></h1>
            <p>Premium Taxi Services & Bespoke Tours Across Devbhoomi</p>
            <a href="https://wa.me/919045066598?text=Hello!%20I%20want%20to%20book%20a%20tour%20with%204D%20Travels." target="_blank" class="btn-luxury">Book Your Journey</a>
        </div>
    </div>

    <!-- Floating WhatsApp Action Button (Linked to 9045066598) -->
    <a href="https://wa.me/919045066598?text=Hello%204D%20Tour%20and%20Travel,%20I%20am%20interested%20in%20your%20services." class="whatsapp-float" target="_blank" title="Chat on WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
